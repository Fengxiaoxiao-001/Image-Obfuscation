<!DOCTYPE html>

    <style>
        * {

<body>
<div class="container">
    <header>
        <h1>🔒 潇潇图片混淆v2.1</h1>
        <p>无密钥永久可用 • 支持原生bmp格式 • 智能打包分享</p>
    </header>

    <div class="dashboard">
        <div id="drop-zone">
            <span class="icon-upload">📥</span>
            <p style="font-weight: 600; margin-bottom: 5px;">点击上传或将文件拖拽至此处</p>
            <p style="font-size: 0.85rem; color: #718096;">支持图片文件或包含图片的 ZIP 压缩包</p>
        </div>

        <div class="primary-actions">
            <button id="enc-all" class="btn btn-primary">⚡ 批量混淆</button>
            <button id="dec-all" class="btn btn-warning">🔓 批量解密</button>
            <button id="strip-all-btn" class="btn btn-danger">🗑️ 批量清理元数据</button>
            <button id="save-all" class="btn btn-success">💾 批量打包保存</button>

        </div>

                </select>
            </label>
            <label class="setting-item">
                <span>JPEG质量:</span>
                <select id="jpeg-quality">
                    <option value="0.95">高质量 (95%)</option>

<div id="share-modal">

</div>

<div id="password-modal" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); display: none;
    align-items: center; justify-content: center; z-index: 1000; padding: 20px;">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px; color: #e2e8f0;">🔒 需要解压密码</h3>
        <p style="font-size: 0.85rem; color: #718096; margin-bottom: 10px;" id="password-filename">该 ZIP 文件已加密</p>
        <div class="password-input-group">
            <input type="password" id="zip-password-input" placeholder="输入密码..." autocomplete="new-password">
            <div id="password-error">密码错误，请重试</div>
        </div>
        <div class="modal-buttons">
            <button id="password-confirm-btn" class="btn btn-primary">确认解密</button>
            <button id="password-cancel-btn" class="btn btn-secondary">取消</button>
        </div>
    </div>
</div>

<script>
    const imagesData = new Map();
    const dropZone = document.getElementById("drop-zone");
    const grid = document.getElementById("grid");
    const queueCount = document.getElementById("queue-count");
    const outFormatSelect = document.getElementById("out-format");
    const autoStripCheck = document.getElementById("auto-strip");
    const jpegQualitySelect = document.getElementById("jpeg-quality");
    const saveAllBtn = document.getElementById("save-all");
    const shareModal = document.getElementById("share-modal");
    const shareModalImg = document.getElementById("share-modal-img");

    class WorkerPool {
        constructor(maxWorkers = navigator.hardwareConcurrency || 4) {
            this.maxWorkers = maxWorkers;
            this.workers = [];
            this.queue = [];
            this.activeCount = 0;
            this.initWorkers();
        }

        initWorkers() {
            const workerCode = `
                function gilbert2dFlat(width, height) {
                    const coords = new Int32Array(width * height * 2);
                    let ptr = 0;
                    function generate2d(x, y, ax, ay, bx, by) {
                        const w = Math.abs(ax + ay);
                        const h = Math.abs(bx + by);
                        const dax = Math.sign(ax), day = Math.sign(ay);
                        const dbx = Math.sign(bx), dby = Math.sign(by);

                        if (h === 1) {
                            for (let i = 0; i < w; i++) {
                                coords[ptr++] = x; coords[ptr++] = y;
                                x += dax; y += day;
                            }
                            return;
                        }
                        if (w === 1) {
                            for (let i = 0; i < h; i++) {
                                coords[ptr++] = x; coords[ptr++] = y;
                                x += dbx; y += dby;
                            }
                            return;
                        }

                        let ax2 = Math.floor(ax / 2), ay2 = Math.floor(ay / 2);
                        let bx2 = Math.floor(bx / 2), by2 = Math.floor(by / 2);
                        const w2 = Math.abs(ax2 + ay2);
                        const h2 = Math.abs(bx2 + by2);

                        if (2 * w > 3 * h) {
                            if ((w2 % 2) && (w > 2)) { ax2 += dax; ay2 += day; }
                            generate2d(x, y, ax2, ay2, bx, by);
                            generate2d(x + ax2, y + ay2, ax - ax2, ay - ay2, bx, by);
                        } else {
                            if ((h2 % 2) && (h > 2)) { bx2 += dbx; by2 += dby; }
                            generate2d(x, y, bx2, by2, ax2, ay2);
                            generate2d(x + bx2, y + by2, ax, ay, bx - bx2, by - by2);
                            generate2d(x + (ax - dax) + (bx2 - dbx), y + (ay - day) + (by2 - dby), -bx2, -by2, -(ax - ax2), -(ay - ay2));
                        }
                    }
                    if (width >= height) generate2d(0, 0, width, 0, 0, height);
                    else generate2d(0, 0, 0, height, width, 0);
                    return coords;
                }

                self.onmessage = function(e) {
                    const { d, w, h, isDecrypt } = e.data;
                    const totalPixels = w * h;
                    const offset = Math.round((Math.sqrt(5) - 1) / 2 * totalPixels) || 1;

                    const curve = gilbert2dFlat(w, h);

                    const src32 = new Uint32Array(d.buffer);
                    const dstBuffer = new ArrayBuffer(d.buffer.byteLength);
                    const dst32 = new Uint32Array(dstBuffer);

                    if (!isDecrypt) {
                        for (let i = 0; i < totalPixels; i++) {
                            const old_x = curve[i * 2];
                            const old_y = curve[i * 2 + 1];
                            const new_idx = (i + offset) % totalPixels;
                            const new_x = curve[new_idx * 2];
                            const new_y = curve[new_idx * 2 + 1];
                            dst32[new_x + new_y * w] = src32[old_x + old_y * w];
                        }
                    } else {
                        for (let i = 0; i < totalPixels; i++) {
                            const old_x = curve[i * 2];
                            const old_y = curve[i * 2 + 1];
                            const new_idx = (i + offset) % totalPixels;
                            const new_x = curve[new_idx * 2];
                            const new_y = curve[new_idx * 2 + 1];
                            dst32[old_x + old_y * w] = src32[new_x + new_y * w];
                        }
                    }

                    const outArray = new Uint8ClampedArray(dstBuffer);
                    self.postMessage({ d: outArray }, [dstBuffer]);
                };
            `;
            const blob = new Blob([workerCode], {type: "application/javascript"});
            const url = URL.createObjectURL(blob);
            for (let i = 0; i < this.maxWorkers; i++) {
                this.workers.push({worker: new Worker(url), active: false});
            }
        }

        run(taskData) {
            return new Promise((resolve, reject) => {
                this.queue.push({taskData, resolve, reject});
                this.next();
            });
        }

        next() {
            if (this.queue.length === 0 || this.activeCount >= this.maxWorkers) return;
            const slot = this.workers.find(w => !w.active);
            if (!slot) return;
            const task = this.queue.shift();
            slot.active = true;
            this.activeCount++;

            slot.worker.onmessage = (e) => {
                slot.active = false;
                this.activeCount--;
                task.resolve(e.data);
                this.next();
            };

            slot.worker.onerror = (err) => {
                slot.active = false;
                this.activeCount--;
                task.reject(err);
                this.next();
            };

            slot.worker.postMessage(task.taskData, [task.taskData.d.buffer]);
        }
    }

    const pool = new WorkerPool();

    function updateCounter() {
        queueCount.textContent = imagesData.size;
    }

    // 优雅密码输入 UI 控制 Promise
    function requestZipPassword(filename) {
        return new Promise((resolve) => {
            const modal = document.getElementById("password-modal");
            const input = document.getElementById("zip-password-input");
            const confirmBtn = document.getElementById("password-confirm-btn");
            const cancelBtn = document.getElementById("password-cancel-btn");
            const errorMsg = document.getElementById("password-error");

            document.getElementById("password-filename").textContent = `文件 [${filename}] 已加密，请输入解压密码`;
            input.value = "";
            errorMsg.style.display = "none";
            modal.style.display = "flex";
            input.focus();

            const cleanup = () => {
                modal.style.display = "none";
                confirmBtn.onclick = null;
                cancelBtn.onclick = null;
                input.onkeydown = null;
            };

            const submit = () => {
                if (input.value) {
                    resolve(input.value);
                } else {
                    errorMsg.textContent = "密码不能为空";
                    errorMsg.style.display = "block";
                }
            };

            confirmBtn.onclick = submit;
            input.onkeydown = (e) => {
                if (e.key === "Enter") submit();
            };

            cancelBtn.onclick = () => {
                cleanup();
                resolve(null); // 返回 null 代表用户取消操作（优雅退出）
            };
        });
    }

    // 重新设计支持密码校验、重试、取消的 processFile 函数
    async function processFile(file) {
        if (file.type === "application/zip" || file.name.toLowerCase().endsWith(".zip")) {
            let zipReader;
            try {
                zipReader = new zip.ZipReader(new zip.BlobReader(file));
                const entries = await zipReader.getEntries();

                let zipPassword = "";
                let isEncrypted = entries.some(e => e.encrypted);

                // 捕获到加密项，开始请求密码循环
                if (isEncrypted) {
                    while (true) {
                        zipPassword = await requestZipPassword(file.name);

                        // 【优雅退出】：点击取消则直接退出处理，不崩溃
                        if (zipPassword === null) {
                            await zipReader.close();
                            return;
                        }

                        try {
                            // 校验密码：尝试提取第一个图片文件进行试错
                            const testEntry = entries.find(e => e.encrypted && /\.(png|jpe?g|webp|bmp|gif)$/i.test(e.filename));
                            if (testEntry) {
                                await testEntry.getData(new zip.BlobWriter(), {password: zipPassword});
                            }
                            // 没有抛出异常说明密码正确，关闭输入框，跳出循环
                            document.getElementById("password-modal").style.display = "none";
                            break;
                        } catch (e) {
                            // 【优雅重试】：密码错误触发提示，保持弹窗并重置输入
                            const errorMsg = document.getElementById("password-error");
                            errorMsg.textContent = "密码错误，请重新输入";
                            errorMsg.style.display = "block";
                            document.getElementById("zip-password-input").value = "";
                        }
                    }
                }

                // 校验通过或包本身没有加密，执行真正的批量提取
                for (const entry of entries) {
                    if (!entry.directory && /\.(png|jpe?g|webp|bmp|gif)$/i.test(entry.filename)) {
                        const writer = new zip.BlobWriter();
                        const blob = await entry.getData(writer, {password: zipPassword});
                        const cleanName = entry.filename.split('/').pop();
                        const extractedFile = new File([blob], cleanName, {type: blob.type || "image/png"});
                        await addImage(extractedFile);
                    }
                }
            } catch (e) {
                alert("ZIP 文件解析失败，可能是文件受损或存在不受支持的特殊压缩格式。");
                console.error(e);
            } finally {
                if (zipReader) {
                    await zipReader.close();
                }
            }
        } else if (file.type.startsWith("image/")) {
            await addImage(file);
        }
    }

    async function addImage(file) {
        const id = Date.now() + Math.random().toString(36).substr(2, 9);
        let targetFile = file;
        if (autoStripCheck.checked) {
            targetFile = await stripMetadataDirectly(file);
        }

        const initialBmp = await createImageBitmap(targetFile);
        const w = initialBmp.width;
        const h = initialBmp.height;
        initialBmp.close();

        const imgUrl = URL.createObjectURL(targetFile);
        const imgEl = document.createElement("img");
        imgEl.src = imgUrl;

        imagesData.set(id, {
            blob: targetFile,
            name: targetFile.name,
            type: targetFile.type,
            width: w,
            height: h,
            previewUrl: imgUrl,
            previewElement: imgEl
        });

        createCardUI(id);
        updateCounter();
    }

    function createCardUI(id) {
        const data = imagesData.get(id);
        const card = document.createElement("div");
        card.className = "card";
        card.id = `card-${id}`;

        const wrapper = document.createElement("div");
        wrapper.className = "card-preview-wrapper";
        data.previewElement.id = `img-${id}`;
        wrapper.appendChild(data.previewElement);
        card.appendChild(wrapper);

        const info = document.createElement("div");
        info.className = "card-info";

        const meta = document.createElement("div");
        meta.className = "file-meta";
        const h3 = document.createElement("h3");
        h3.textContent = data.name;
        const p = document.createElement("p");
        p.id = `size-${id}`;
        p.textContent = `${data.width} × ${data.height} | ${(data.blob.size / 1024).toFixed(1)} KB`;
        meta.appendChild(h3);
        meta.appendChild(p);
        info.appendChild(meta);

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const encBtn = document.createElement("button");
        encBtn.className = "btn btn-sm btn-primary";
        encBtn.textContent = "混淆";
        encBtn.onclick = () => transformSingle(id, false);

        const decBtn = document.createElement("button");
        decBtn.className = "btn btn-sm btn-warning";
        decBtn.textContent = "解密";
        decBtn.onclick = () => transformSingle(id, true);

        const stripBtn = document.createElement("button");
        stripBtn.className = "btn btn-sm btn-secondary";
        stripBtn.textContent = "清元数据";
        stripBtn.onclick = () => stripMetadataSingle(id);

        const saveBtn = document.createElement("button");
        saveBtn.className = "btn btn-sm btn-success";
        saveBtn.textContent = "保存";
        saveBtn.onclick = () => saveSingle(id);

        const shareBtn = document.createElement("button");
        shareBtn.className = "btn btn-sm btn-secondary";
        shareBtn.textContent = "分享";
        shareBtn.onclick = () => shareSingle(id);

        const delBtn = document.createElement("button");
        delBtn.className = "btn btn-sm btn-card-danger";
        delBtn.textContent = "移除";
        delBtn.onclick = () => removeImage(id);

        actions.appendChild(encBtn);
        actions.appendChild(decBtn);
        actions.appendChild(stripBtn);
        actions.appendChild(saveBtn);
        actions.appendChild(shareBtn);
        actions.appendChild(delBtn);
        info.appendChild(actions);

        card.appendChild(info);
        grid.appendChild(card);
    }

    async function transformSingle(id, isDecrypt = false) {
        const data = imagesData.get(id);
        if (!data) return;

        let format = outFormatSelect.value;
        if (format === 'original') format = 'png';

        data.blob = await applyPixelObfuscationInPool(data.blob, data.width, data.height, isDecrypt, format);
        await refreshPreview(id);
    }

    async function stripMetadataSingle(id) {
        const data = imagesData.get(id);
        if (!data) return;
        const strippedBlob = await stripMetadataDirectly(data.blob);
        data.blob = strippedBlob;
        await refreshPreview(id);
    }

    async function stripMetadataDirectly(blob) {
        if (blob.type !== "image/jpeg") {
            const bmp = await createImageBitmap(blob);
            const cvs = document.createElement("canvas");
            cvs.width = bmp.width;
            cvs.height = bmp.height;
            const ctx = cvs.getContext("2d");
            ctx.drawImage(bmp, 0, 0);
            bmp.close();
            const outType = blob.type || "image/png";
            const quality = parseFloat(jpegQualitySelect.value);
            const resBlob = await new Promise(r => cvs.toBlob(r, outType, quality));
            return new File([resBlob], blob.name, {type: outType});
        }

        try {
            const buffer = await blob.arrayBuffer();
            const binary = new Uint8Array(buffer);
            let binaryString = "";
            const len = binary.length;
            const chunkSize = 65536;
            for (let i = 0; i < len; i += chunkSize) {
                const subArray = binary.subarray(i, i + chunkSize);
                binaryString += String.fromCharCode.apply(null, subArray);
            }
            const cleanBinaryString = piexif.remove(binaryString);
            const cleanLen = cleanBinaryString.length;
            const outputBuffer = new Uint8Array(cleanLen);
            for (let i = 0; i < cleanLen; i++) {
                outputBuffer[i] = cleanBinaryString.charCodeAt(i);
            }
            return new File([outputBuffer], blob.name, {type: "image/jpeg"});
        } catch (e) {
            const bmp = await createImageBitmap(blob);
            const cvs = document.createElement("canvas");
            cvs.width = bmp.width;
            cvs.height = bmp.height;
            const ctx = cvs.getContext("2d");
            ctx.drawImage(bmp, 0, 0);
            bmp.close();
            const quality = parseFloat(jpegQualitySelect.value);
            const resBlob = await new Promise(r => cvs.toBlob(r, "image/jpeg", quality));
            return new File([resBlob], blob.name, {type: "image/jpeg"});
        }
    }

    async function refreshPreview(id) {
        const data = imagesData.get(id);
        if (!data) return;

        if (data.previewUrl) URL.revokeObjectURL(data.previewUrl);

        data.previewUrl = URL.createObjectURL(data.blob);
        data.previewElement.src = data.previewUrl;

        document.getElementById(`size-${id}`).textContent = `${data.width} × ${data.height} | ${(data.blob.size / 1024).toFixed(1)} KB`;
    }

    async function exportToBMP(imageData) {
        const {width, height, data} = imageData;
        const headerSize = 54;
        const fileSize = headerSize + width * height * 4;
        const buffer = new ArrayBuffer(fileSize);
        const view = new DataView(buffer);

        view.setUint8(0, 0x42);
        view.setUint8(1, 0x4D);
        view.setUint32(2, fileSize, true);
        view.setUint32(10, headerSize, true);
        view.setUint32(14, 40, true);
        view.setInt32(18, width, true);
        view.setInt32(22, height, true);
        view.setUint16(26, 1, true);
        view.setUint16(28, 32, true);
        view.setUint32(34, width * height * 4, true);

        const pixels = new Uint8Array(buffer, headerSize);
        pixels.set(data);

        return new Blob([buffer], {type: "image/bmp"});
    }

    async function applyPixelObfuscationInPool(blob, width, height, isDecrypt = false, format = 'png') {
        const bmp = await createImageBitmap(blob);
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(bmp, 0, 0);
        const imageData = ctx.getImageData(0, 0, width, height);
        bmp.close();

        const result = await pool.run({
            d: imageData.data,
            w: width,
            h: height,
            isDecrypt
        });

        const formatSelect = document.getElementById('out-format');
        const selectedFormat = formatSelect ? formatSelect.value : format;

        if (selectedFormat === 'bmp') {
            return await createBMPBlob(result.d, width, height);
        } else if (selectedFormat === 'jpeg') {
            const newImageData = new ImageData(result.d, width, height);
            ctx.putImageData(newImageData, 0, 0);
            const quality = parseFloat(jpegQualitySelect.value);
            return await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
        } else {
            const newImageData = new ImageData(result.d, width, height);
            ctx.putImageData(newImageData, 0, 0);
            return await new Promise(r => canvas.toBlob(r, 'image/png'));
        }
    }

    async function createBMPBlob(pixelData, width, height) {
        const rowSize = Math.floor((32 * width + 31) / 32) * 4;
        const pixelArraySize = rowSize * height;
        const headerSize = 54;
        const buffer = new ArrayBuffer(headerSize + pixelArraySize);
        const view = new DataView(buffer);
        const pixels = new Uint8Array(buffer, headerSize);

        view.setUint16(0, 0x4D42, true);
        view.setUint32(2, buffer.byteLength, true);
        view.setUint32(10, headerSize, true);
        view.setUint32(14, 40, true);
        view.setInt32(18, width, true);
        view.setInt32(22, height, true);
        view.setUint16(26, 1, true);
        view.setUint16(28, 32, true);
        view.setUint32(34, pixelArraySize, true);

        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const srcIdx = (y * width + x) * 4;
                const dstIdx = ((height - 1 - y) * rowSize) + (x * 4);
                pixels[dstIdx] = pixelData[srcIdx + 2];
                pixels[dstIdx + 1] = pixelData[srcIdx + 1];
                pixels[dstIdx + 2] = pixelData[srcIdx];
                pixels[dstIdx + 3] = pixelData[srcIdx + 3];
            }
        }
        return new File([buffer], "output.bmp", {type: "image/bmp"});
    }

    async function processWithMetadata(originalBlob, canvas) {
        try {
            const originalBuffer = await originalBlob.arrayBuffer();
            const originalBinary = String.fromCharCode.apply(null, new Uint8Array(originalBuffer));
            const exifObj = piexif.load(originalBinary);

            const quality = parseFloat(jpegQualitySelect.value);
            const canvasBlob = await new Promise(r => canvas.toBlob(r, "image/jpeg", quality));
            const canvasBuffer = await canvasBlob.arrayBuffer();
            const canvasBinary = String.fromCharCode.apply(null, new Uint8Array(canvasBuffer));

            const exifBytes = piexif.dump(exifObj);
            const finalBinary = piexif.insert(exifBytes, canvasBinary);

            const finalBuffer = new Uint8Array(finalBinary.length);
            for (let i = 0; i < finalBinary.length; i++) {
                finalBuffer[i] = finalBinary.charCodeAt(i);
            }
            return new File([finalBuffer], originalBlob.name, {type: "image/jpeg"});
        } catch (e) {
            console.warn("元数据保留失败，已降级为无元数据导出", e);
            const quality = parseFloat(jpegQualitySelect.value);
            const fallbackBlob = await new Promise(r => canvas.toBlob(r, "image/jpeg", quality));
            return new File([fallbackBlob], originalBlob.name, {type: "image/jpeg"});
        }
    }

    function getExportMimeType(origType) {
        const val = outFormatSelect.value;
        if (val === "png") return "image/png";
        if (val === "jpeg") return "image/jpeg";
        return origType || "image/png";
    }

    function removeImage(id) {
        const data = imagesData.get(id);
        if (data && data.previewUrl) {
            URL.revokeObjectURL(data.previewUrl);
        }
        imagesData.delete(id);
        const el = document.getElementById(`card-${id}`);
        if (el) el.remove();
        updateCounter();
    }

    function saveSingle(id) {
        const data = imagesData.get(id);
        if (!data) return;
        const url = URL.createObjectURL(data.blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = data.name;
        a.click();
        URL.revokeObjectURL(url);
    }

    function shareSingle(id) {
        const data = imagesData.get(id);
        if (!data) return;
        shareModalImg.src = data.previewUrl;
        shareModal.style.display = "flex";

        document.getElementById("share-confirm-btn").onclick = async () => {
            if (navigator.share && navigator.canShare) {
                try {
                    const file = new File([data.blob], data.name, {type: data.blob.type});
                    if (navigator.canShare({files: [file]})) {
                        await navigator.share({files: [file], title: "分享图片", text: data.name});
                    } else {
                        throw new Error("Cannot share this file type");
                    }
                } catch (e) {
                    alert("系统分享调起失败或不支持，请长按上方图片发送。");
                }
            } else {
                alert("当前环境不支持原生分享，请长按上方图片保存/发送。");
            }
        };
    }

    document.getElementById("share-close-btn").onclick = () => {
        shareModal.style.display = "none";
    };

    document.getElementById("enc-all").onclick = async () => {
        const btn = document.getElementById("enc-all");
        btn.disabled = true;
        const originalText = btn.textContent;
        let index = 1;
        const total = imagesData.size;

        for (const id of imagesData.keys()) {
            btn.textContent = `混淆中 (${index}/${total})`;
            await transformSingle(id, false);
            index++;
        }
        btn.textContent = originalText;
        btn.disabled = false;
    };

    document.getElementById("dec-all").onclick = async () => {
        const btn = document.getElementById("dec-all");
        btn.disabled = true;
        const originalText = btn.textContent;
        let index = 1;
        const total = imagesData.size;

        for (const id of imagesData.keys()) {
            btn.textContent = `解密中 (${index}/${total})`;
            await transformSingle(id, true);
            index++;
        }
        btn.textContent = originalText;
        btn.disabled = false;
    };

    document.getElementById("strip-all-btn").onclick = async () => {
        const btn = document.getElementById("strip-all-btn");
        btn.disabled = true;
        const originalText = btn.textContent;
        let index = 1;
        const total = imagesData.size;

        for (const id of imagesData.keys()) {
            btn.textContent = `清理中 (${index}/${total})`;
            await stripMetadataSingle(id);
            index++;
        }
        btn.textContent = originalText;
        btn.disabled = false;
    };

    saveAllBtn.onclick = async () => {
        if (imagesData.size === 0) return;
        saveAllBtn.disabled = true;
        const originalText = saveAllBtn.textContent;
        saveAllBtn.textContent = "准备打包...";

        try {
            const zip = new JSZip();
            for (const [id, data] of imagesData.entries()) {
                zip.file(data.name, data.blob, {compression: "STORE"});
            }

            const zipBlob = await zip.generateAsync({type: "blob", compression: "STORE"}, (meta) => {
                saveAllBtn.textContent = `打包中 ${Math.round(meta.percent)}%`;
            });

            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `潇潇处理合集_${Date.now()}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            saveAllBtn.textContent = "打包完成";
            setTimeout(() => {
                saveAllBtn.textContent = originalText;
                saveAllBtn.disabled = false;
            }, 1000);
        } catch (error) {
            alert("打包失败");
            saveAllBtn.textContent = originalText;
            saveAllBtn.disabled = false;
        }
    };

    document.getElementById("share-all").onclick = async () => {
        if (imagesData.size === 0) return;

        const btn = document.getElementById("share-all");
        btn.disabled = true;
        btn.textContent = "正在准备分享...";

        try {
            const zip = new JSZip();
            for (const [id, data] of imagesData.entries()) {
                zip.file(data.name, data.blob);
            }
            const blob = await zip.generateAsync({type: "blob"});

            const zipFile = new File([blob], `data_${Date.now()}.zip`, {
                type: "application/zip",
                lastModified: Date.now()
            });

            if (navigator.share && navigator.canShare && navigator.canShare({files: [zipFile]})) {
                await navigator.share({
                    files: [zipFile],
                    title: "分享压缩包",
                    text: "请选择分享渠道"
                });
            } else {
                alert("该设备不支持浏览器直接分享ZIP文件，已自动下载到本地。");
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `潇潇密卷_${Date.now()}.zip`;
                a.click();
            }
        } catch (err) {
            console.error(err);
            alert("分享失败，请尝试打包后手动发送");
        } finally {
            btn.textContent = "一键分享";
            btn.disabled = false;
        }
    };


    document.getElementById("clear-all").onclick = () => {
        for (const [id, data] of imagesData.entries()) {
            if (data.previewUrl) URL.revokeObjectURL(data.previewUrl);
        }
        imagesData.clear();
        grid.innerHTML = "";
        updateCounter();
    };

    async function pasteFromClipboard() {
        try {
            const items = await navigator.clipboard.read();
            for (const item of items) {
                for (const type of item.types) {
                    if (type.startsWith("image/")) {
                        const blob = await item.getType(type);
                        const file = new File([blob], `clipboard_${Date.now()}.png`, {type: type});
                        await addImage(file);
                        return;
                    }
                }
            }
        } catch {
            alert("无法读取剪切板图片，请检查权限");
        }
    }

    document.getElementById("paste").onclick = pasteFromClipboard;

    document.addEventListener("paste", async (e) => {
        const file = e.clipboardData?.items[0]?.getAsFile();
        if (file && file.type.startsWith("image/")) {
            await addImage(file);
        }
    });

    dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("drag-over");
    });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", async (e) => {
        e.preventDefault();
        dropZone.classList.remove("drag-over");
        if (e.dataTransfer?.files) {
            for (const file of Array.from(e.dataTransfer.files)) {
                await processFile(file);
            }
        }
    });

    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*,.zip";
    fileInput.multiple = true;
    fileInput.onchange = async (e) => {
        if (e.target.files) {
            for (const file of Array.from(e.target.files)) {
                await processFile(file);
            }
        }
    };
    dropZone.onclick = () => fileInput.click();
</script>
</body>
